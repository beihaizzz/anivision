[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Output
addopts = -v --tb=short --strict-markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires dependencies)
    slow: Slow tests

# Coverage (optional, install pytest-cov to use)
# addopts = -v --tb=short --cov=app --cov-report=term-missing
